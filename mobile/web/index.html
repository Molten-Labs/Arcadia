<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Arcadia Protocol</title>
    <script>
      (function () {
        var suppress = function (event) {
          var msg = (event && event.reason && event.reason.message) ? event.reason.message : '';
          if (
            msg === 'A network error occurred.' ||
            msg.indexOf('Failed to fetch') !== -1 ||
            msg.indexOf('WebSocket') !== -1 ||
            msg.indexOf('timed out') !== -1 ||
            msg.indexOf('Network request failed') !== -1
          ) {
            event.preventDefault();
            event.stopImmediatePropagation();
          }
        };
        window.addEventListener('unhandledrejection', suppress, true);
      })();
    </script>
    <style>
      @font-face {
        font-family: 'Ionicons';
        src: url('./fonts/Ionicons.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
      }
    </style>
    <style id="expo-reset">
      html, body { height: 100%; }
      body { overflow: hidden; }
      #root { display: flex; height: 100%; flex: 1; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
