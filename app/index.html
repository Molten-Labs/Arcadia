<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arcadia — Proof-gated Solana vaults</title>
    <meta name="description" content="Arcadia lets traders earn allocation only after proving performance with first-loss capital, while investors see the risk buffer before depositing.">
    <meta name="author" content="Arcadia" />

    <!-- PWA / installability -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0C0C0E" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Arcadia" />

    <!-- Icons -->
    <link rel="icon" href="/arcadia-logo.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/arcadia-logo.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Arcadia — Proof-gated Solana vaults">
    <meta property="og:description" content="Arcadia lets traders earn allocation only after proving performance with first-loss capital, while investors see the risk buffer before depositing.">
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/attachments/og-images/434a1eab-c677-4839-9a33-192213679871">
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Arcadia — Proof-gated Solana vaults">
    <meta name="twitter:description" content="Arcadia lets traders earn allocation only after proving performance with first-loss capital, while investors see the risk buffer before depositing.">
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/attachments/og-images/434a1eab-c677-4839-9a33-192213679871">

    <!-- Preconnect to Solana RPC so first wallet call is faster -->
    <link rel="preconnect" href="https://api.devnet.solana.com" crossorigin />

    <!-- ─── Inline loading screen ────────────────────────────────────────────
         Renders in microseconds — no JS required. Fades out once React mounts.
         On repeat visits the SW serves chunks from cache so this is barely
         visible, but it prevents the black-screen experience on cold loads.
    ────────────────────────────────────────────────────────────────────────── -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body {
        background: #0C0C0E;
        color: #fff;
        font-family: system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      #app-loader {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 20px;
        background: #0C0C0E;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #app-loader.hidden { opacity: 0; pointer-events: none; }

      .loader-wordmark {
        font-size: 13px; font-weight: 700;
        letter-spacing: 5px; color: #A3E635;
        font-family: 'Courier New', monospace;
      }
      .loader-ring {
        width: 36px; height: 36px;
        border: 2px solid #27272A;
        border-top-color: #A3E635;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .loader-sub {
        font-size: 11px; color: #52525B;
        letter-spacing: 0.5px;
        font-family: 'Courier New', monospace;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>

  <body>
    <div id="app-loader">
      <span class="loader-wordmark">ARCADIA</span>
      <div class="loader-ring"></div>
      <span class="loader-sub" id="loader-sub-text">Loading protocol…</span>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- ─── Loader dismiss ──────────────────────────────────────────────────
         Watches #root for React's first child element, then fades the loader.
         Also detects SW-served (cached) loads and updates the hint text.
    ────────────────────────────────────────────────────────────────────────── -->
    <script>
      (function () {
        var root    = document.getElementById('root');
        var loader  = document.getElementById('app-loader');
        var subText = document.getElementById('loader-sub-text');
        if (!root || !loader) return;

        // Show "cached" hint when SW serves the page
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistration('/').then(function (reg) {
            if (reg && reg.active) {
              if (subText) subText.textContent = 'Serving from cache…';
            }
          });
        }

        function dismiss() {
          loader.classList.add('hidden');
          setTimeout(function () {
            if (loader.parentNode) loader.parentNode.removeChild(loader);
          }, 350);
        }

        var obs = new MutationObserver(function () {
          if (root.childElementCount > 0) { dismiss(); obs.disconnect(); }
        });
        obs.observe(root, { childList: true });

        // Hard fallback — never leave the user stranded
        setTimeout(function () { dismiss(); }, 10000);
      })();
    </script>
  </body>
</html>
